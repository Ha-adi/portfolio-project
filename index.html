<!-- Simplified version: cleaner UI, minimal effects, Supabase unchanged -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdul Haadi — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }

  nav {
    display: flex;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: #020617;
  }

  nav a {
    color: #94a3b8;
    text-decoration: none;
    margin-left: 1rem;
  }

  section {
    padding: 4rem 2rem;
    max-width: 900px;
    margin: auto;
  }

  h1, h2 {
    margin-bottom: 1rem;
  }

  .hero h1 {
    font-size: 2.5rem;
  }

  .btn {
    display: inline-block;
    padding: 0.6rem 1.2rem;
    background: #6366f1;
    color: white;
    text-decoration: none;
    margin-top: 1rem;
    border-radius: 6px;
  }

  .grid {
    display: grid;
    gap: 1rem;
  }

  .skills {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }

  .card {
    background: #020617;
    padding: 1rem;
    border-radius: 8px;
  }

  input, textarea {
    width: 100%;
    padding: 0.6rem;
    margin-bottom: 1rem;
    border-radius: 6px;
    border: none;
  }

  button {
    padding: 0.6rem;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 6px;
  }

  .messages {
    margin-top: 2rem;
  }

</style>
</head>
<body>

<nav>
  <div>AH</div>
  <div>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Abdul Haadi</h1>
  <p>Aspiring Web Developer & Cloud Computing Student</p>
  <a href="#contact" class="btn">Contact Me</a>
</section>

<section id="about">
  <h2>About</h2>
  <p>I am a BCA Cloud Computing student learning web development and programming.</p>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div class="grid skills">
    <div class="card">Python</div>
    <div class="card">C Programming</div>
    <div class="card">Problem Solving</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <textarea id="message" placeholder="Message" required></textarea>
    <button type="submit" id="submitBtn">Send</button>
    <div id="form-status"></div>
  </form>

  <div class="messages" id="messages-list"></div>
</section>

<script>
  // SAME SUPABASE CODE (UNCHANGED)
  const SUPABASE_URL = 'https://xipboskoiqsxrdclrnlt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhpcGJvc2tvaXFzeHJkY2xybmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzQ0OTMsImV4cCI6MjA5MDExMDQ5M30.DWmtoWaiusvvFiPWI9HxAFrvKl3srIgmZuN38airlE0';

  async function supabaseFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': options.prefer || 'return=minimal'
      },
      ...options
    });
    return res;
  }

  async function loadMessages() {
    try {
      const res = await supabaseFetch('messages?select=*&order=created_at.desc&limit=5');
      const data = await res.json();
      document.getElementById('messages-list').innerHTML = data.map(m => `
        <div class="card">
          <strong>${m.name}</strong><br>
          ${m.email}<br>
          ${m.message}
        </div>
      `).join('');
    } catch {
      document.getElementById('messages-list').innerHTML = 'No messages yet';
    }
  }

  document.getElementById('contactForm').addEventListener('submit', async e => {
    e.preventDefault();
    const name = name.value;
    const email = email.value;
    const message = message.value;

    await supabaseFetch('messages', {
      method: 'POST',
      body: JSON.stringify({ name, email, message })
    });

    loadMessages();
  });

  loadMessages();
</script>

</body>
</html>
